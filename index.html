<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FocusFlow Pro</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="worklogo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #2563eb; --bg: #000000; --text: #ffffff; }
        
        body { 
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            margin: 0;
        }
        [v-cloak] { display: none; }
        
        .glass { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .day-active { background-color: #ffffff !important; color: #000000 !important; }

        /* WEISS-GOLD MODUS LOGIK */
        .light-mode { --bg: #ffffff; --text: #000000; --accent: #D4AF37; }
        
        .light-mode .glass { 
            background: rgba(245, 245, 247, 0.8) !important; 
            border: 1px solid rgba(0,0,0,0.08) !important; 
            color: #000000 !important; 
        }

        /* Gold-Transformation für alle blauen Elemente */
        .light-mode .text-blue-500, .light-mode .text-blue-600 { color: var(--accent) !important; }
        .light-mode .bg-blue-600, .light-mode .bg-blue-500 { background-color: var(--accent) !important; }
        .light-mode .border-blue-500, .light-mode .border-blue-600 { border-color: var(--accent) !important; }
        
        /* Schatten in Gold */
        .light-mode .shadow-blue-600\/40 { box-shadow: 0 20px 25px -5px rgba(212, 175, 55, 0.4) !important; }
        .light-mode .shadow-blue-600\/20 { box-shadow: 0 10px 15px -3px rgba(212, 175, 55, 0.2) !important; }
        
        /* Spezial-Elemente im Light Mode */
        .light-mode .bg-blue-600\/20 { background-color: rgba(212, 175, 55, 0.15) !important; }
        .light-mode .day-active { background-color: #000000 !important; color: #ffffff !important; }
        .light-mode input, .light-mode textarea { background: #f2f2f7 !important; color: #000000 !important; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .task-card { transition: transform 0.2s ease, opacity 0.3s ease; }
        .task-card:active { transform: scale(0.98); }
    </style>
</head>
<body :class="{ 'light-mode': !isDark }">

<div id="app" v-cloak>
    
    <!-- LOGIN SEITE -->
    <div v-if="!user" class="min-h-screen flex items-center justify-center p-8">
        <div class="w-full max-w-sm text-center">
            <div class="w-24 h-24 bg-blue-600 rounded-[2.2rem] flex items-center justify-center mx-auto mb-6 shadow-2xl overflow-hidden">
                <img src="worklogo.png" alt="Logo" class="w-full h-full object-cover">
            </div>
            <h1 class="text-4xl font-bold tracking-tight mb-8">FocusFlow</h1>
            <form @submit.prevent="handleLogin" class="space-y-4 text-left">
                <input type="email" v-model="loginEmail" placeholder="E-Mail" class="w-full p-5 rounded-2xl outline-none text-lg bg-zinc-900 border-none">
                <input type="password" v-model="loginPassword" placeholder="Passwort" class="w-full p-5 rounded-2xl outline-none text-lg bg-zinc-900 border-none">
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition-all">System starten</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div v-else class="max-w-xl mx-auto min-h-screen pb-32">
        <header class="sticky top-0 z-40 backdrop-blur-xl px-6 pt-14 pb-4 flex justify-between items-center transition-colors">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Übersicht</h1>
                <p class="text-blue-500 font-bold text-xs uppercase tracking-widest mt-1">{{ currentFullDate }}</p>
            </div>
            <div class="flex gap-2">
                <button @click="toggleTheme" class="w-10 h-10 rounded-full glass flex items-center justify-center">
                    <i :data-lucide="isDark ? 'sun' : 'moon'" class="w-5 h-5"></i>
                </button>
                <button @click="handleLogout" class="w-10 h-10 rounded-full glass flex items-center justify-center text-zinc-500">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- TAGES SELECTOR -->
        <div class="flex overflow-x-auto gap-2 px-6 py-5 no-scrollbar">
            <button v-for="(day, index) in days" :key="index" @click="selectedDay = index"
                    class="flex-shrink-0 px-6 py-2.5 rounded-full text-sm font-bold glass transition-all"
                    :class="{ 'day-active': selectedDay === index }">
                {{ day }}
            </button>
        </div>

        <!-- TASKS LISTE -->
        <div class="px-6 space-y-4">
            <div v-for="task in filteredTasks" :key="task.id" @click="openEditModal(task)"
                 class="task-card glass rounded-[2.2rem] p-5 flex items-center gap-5 shadow-lg"
                 :class="{ 'opacity-40': task.completed }">
                
                <div @click.stop="toggleTask(task)" 
                     class="w-9 h-9 rounded-full border-2 flex-shrink-0 flex items-center justify-center transition-all duration-300"
                     :class="task.completed ? 'bg-blue-500 border-blue-500' : 'border-white/20'">
                    <svg v-if="task.completed" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" class="w-5 h-5"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>

                <div class="flex-grow">
                    <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">{{ task.startTime }} — {{ task.endTime }}</span>
                    <h3 class="font-bold text-[17px] leading-tight" :class="{ 'line-through': task.completed }">{{ task.title }}</h3>
                </div>
                <i data-lucide="chevron-right" class="w-5 h-5 opacity-20"></i>
            </div>
            
            <div v-if="filteredTasks.length === 0" class="text-center py-20 opacity-40 glass rounded-[2.2rem]">
                <p class="font-medium">Keine Fokus-Blöcke geplant.</p>
                <button @click="importWorkflow" class="mt-4 text-blue-500 font-bold text-sm uppercase tracking-widest">Workflow laden</button>
            </div>
        </div>

        <!-- FLOATING PLUS BUTTON -->
        <button @click="openAddModal" class="fixed bottom-10 right-8 w-16 h-16 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-2xl shadow-blue-600/40 active:scale-90 transition-all z-50">
            <i data-lucide="plus" class="w-9 h-9"></i>
        </button>
    </div>

    <!-- MODAL FÜR EDIT/ADD -->
    <div v-if="showModal" class="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" @click="closeModal"></div>
        <div class="relative w-full max-w-lg glass rounded-t-[3rem] p-8 space-y-6 transform transition-all shadow-2xl">
            <h2 class="text-2xl font-bold">{{ isEditing ? 'Block bearbeiten' : 'Neuer Fokus-Block' }}</h2>
            
            <div class="space-y-4">
                <input v-model="activeTask.title" placeholder="Was willst du erreichen?" class="w-full p-5 rounded-2xl outline-none bg-zinc-900">
                
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase ml-2 mb-1 block">Start</label>
                        <input v-model="activeTask.startTime" type="time" class="w-full p-4 rounded-2xl bg-zinc-900 border-none">
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase ml-2 mb-1 block">Ende</label>
                        <input v-model="activeTask.endTime" type="time" class="w-full p-4 rounded-2xl bg-zinc-900 border-none">
                    </div>
                </div>

                <textarea v-model="activeTask.description" placeholder="Notizen / Details..." class="w-full p-5 rounded-2xl bg-zinc-900 h-32 resize-none"></textarea>
            </div>

            <div class="flex gap-4">
                <button v-if="isEditing" @click="deleteTask" class="flex-1 py-5 bg-red-500/10 text-red-500 rounded-2xl font-bold active:scale-95 transition-all">Löschen</button>
                <button @click="saveTask" class="flex-[2] py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all">Speichern</button>
            </div>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, writeBatch, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBde6JQJM4QjIW4vVsj5cKwI08IpkioBZA",
        authDomain: "wochenplaner-7c7c5.firebaseapp.com",
        projectId: "wochenplaner-7c7c5",
        storageBucket: "wochenplaner-7c7c5.firebasestorage.app",
        messagingSenderId: "61678130448",
        appId: "1:61678130448:web:a879116ff033b568cf8195"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);
    const auth = getAuth(firebaseApp);

    const { createApp, ref, onMounted, computed, nextTick } = Vue;

    createApp({
        setup() {
            const user = ref(null);
            const isDark = ref(localStorage.getItem('focus_theme') !== 'light');
            const tasks = ref([]);
            const selectedDay = ref(new Date().getDay() === 0 ? 6 : new Date().getDay() - 1);
            const days = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
            const showModal = ref(false);
            const isEditing = ref(false);
            const activeTask = ref({});
            const loginEmail = ref('');
            const loginPassword = ref('');

            const updateIcons = () => nextTick(() => lucide.createIcons());

            const toggleTheme = () => {
                isDark.value = !isDark.value;
                localStorage.setItem('focus_theme', isDark.value ? 'dark' : 'light');
                updateIcons();
            };

            onMounted(() => {
                onAuthStateChanged(auth, (u) => {
                    user.value = u;
                    if (u) loadData(u.uid);
                    updateIcons();
                });
            });

            const loadData = (uid) => {
                const q = query(collection(db, "tasks"), where("uid", "==", uid));
                onSnapshot(q, (snapshot) => {
                    tasks.value = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    checkWeeklyReset(); // RESET PRÜFUNG
                    updateIcons();
                });
            };

            // WOCHEN-RESET (Von Sonntag auf Montag 00:00 Uhr)
            const checkWeeklyReset = async () => {
                const now = new Date();
                // ISO-Wochen-Key (z.B. "2023-W42")
                const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
                d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
                const weekKey = `${d.getUTCFullYear()}-W${Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7)}`;

                const lastReset = localStorage.getItem('focus_reset_week');

                if (lastReset !== weekKey) {
                    const batch = writeBatch(db);
                    let hasChanges = false;
                    tasks.value.forEach(t => {
                        if (t.completed) {
                            batch.update(doc(db, "tasks", t.id), { completed: false });
                            hasChanges = true;
                        }
                    });
                    if (hasChanges) await batch.commit();
                    localStorage.setItem('focus_reset_week', weekKey);
                    console.log("Reset durchgeführt: Neue Woche!");
                }
            };

            const toggleTask = async (task) => {
                if ("vibrate" in navigator) navigator.vibrate(25);
                await updateDoc(doc(db, "tasks", task.id), { completed: !task.completed });
            };

            const handleLogin = async () => {
                try { await signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value); }
                catch (e) { alert("Login-Daten inkorrekt."); }
            };

            const handleLogout = () => signOut(auth);

            const filteredTasks = computed(() => {
                return tasks.value
                    .filter(t => t.day === selectedDay.value)
                    .sort((a, b) => a.startTime.localeCompare(b.startTime));
            });

            const openAddModal = () => {
                isEditing.value = false;
                activeTask.value = { title: '', startTime: '09:00', endTime: '10:00', description: '' };
                showModal.value = true;
                updateIcons();
            };

            const openEditModal = (task) => {
                isEditing.value = true;
                activeTask.value = { ...task };
                showModal.value = true;
                updateIcons();
            };

            const saveTask = async () => {
                if (isEditing.value) {
                    const { id, ...data } = activeTask.value;
                    await updateDoc(doc(db, "tasks", id), data);
                } else {
                    await addDoc(collection(db, "tasks"), {
                        ...activeTask.value,
                        day: selectedDay.value,
                        uid: user.value.uid,
                        completed: false
                    });
                }
                showModal.value = false;
            };

            const deleteTask = async () => {
                if (confirm("Block wirklich löschen?")) {
                    await deleteDoc(doc(db, "tasks", activeTask.value.id));
                    showModal.value = false;
                }
            };

            const importWorkflow = async () => {
                const batch = writeBatch(db);
                const standard = [
                    { t: "Deep Work Block", s: "09:00", e: "11:30" },
                    { t: "Meeting / Calls", s: "13:00", e: "14:30" },
                    { t: "Admin & E-Mails", s: "16:00", e: "17:00" }
                ];
                standard.forEach(item => {
                    const dRef = doc(collection(db, "tasks"));
                    batch.set(dRef, { title: item.t, startTime: item.s, endTime: item.e, day: selectedDay.value, uid: user.value.uid, completed: false });
                });
                await batch.commit();
            };

            const currentFullDate = computed(() => new Intl.DateTimeFormat('de-DE', { day: 'numeric', month: 'long' }).format(new Date()));

            return { 
                user, isDark, toggleTheme, tasks, selectedDay, days, filteredTasks, 
                showModal, isEditing, activeTask, saveTask, openEditModal, openAddModal, 
                closeModal: () => showModal.value = false, deleteTask, toggleTask,
                handleLogin, handleLogout, loginEmail, loginPassword, currentFullDate, importWorkflow 
            };
        }
    }).mount('#app');
</script>
</body>
</html>
